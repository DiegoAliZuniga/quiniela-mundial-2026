<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Predicciones de participantes</title>
  <link rel="icon" type="image/webp" href="assets/world-cup-favicon.webp">
  <link rel="shortcut icon" href="assets/world-cup-favicon.webp">
  <style>
    :root {
      --blue: #0077b6;
      --sky: #caf0f8;
      --ink: #132033;
      --muted: #607087;
      --line: #cfd8dc;
      --hit: #d9f2df;
      --hit-text: #14532d;
      --miss: #fde2e2;
      --miss-text: #8a1c1c;
      --pending: #f8fafc;
      --shadow: 0 22px 56px rgba(7, 24, 39, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--sky);
    }

    button,
    a {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .hero {
      background: var(--blue);
      color: #ffffff;
    }

    .hero-inner,
    .content {
      width: min(1440px, calc(100% - 28px));
      margin: 0 auto;
    }

    .hero-inner {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      padding: 32px 0 26px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: rgba(255, 255, 255, 0.78);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.02;
    }

    .hero-actions,
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.44);
      border-radius: var(--radius);
      padding: 0 14px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
      text-decoration: none;
      font-weight: 900;
    }

    .btn.primary {
      color: var(--blue);
      background: #ffffff;
    }

    .btn.secondary {
      border-color: #bfd7e2;
      color: var(--blue);
      background: #ffffff;
    }

    .content {
      display: grid;
      gap: 22px;
      padding: 22px 0 38px;
    }

    .panel {
      border: 1px solid rgba(191, 215, 226, 0.92);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel:fullscreen,
    .panel.is-fullscreen {
      width: 100vw;
      height: 100vh;
      border: 0;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      box-shadow: none;
      overflow: hidden;
    }

    .panel.is-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    .panel:fullscreen .table-wrap,
    .panel.is-fullscreen .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      padding-bottom: 16px;
    }

    .panel:fullscreen .panel-head,
    .panel.is-fullscreen .panel-head {
      flex: 0 0 auto;
    }

    .panel:fullscreen .mobile-participants,
    .panel.is-fullscreen .mobile-participants,
    .panel:fullscreen .note,
    .panel.is-fullscreen .note {
      display: none;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      line-height: 1.15;
    }

    .panel-copy {
      margin: 7px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.42;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 0 13px;
      color: #475569;
      background: #ffffff;
      font-weight: 900;
      white-space: nowrap;
    }

    .table-wrap {
      width: 100%;
      max-height: 72vh;
      overflow: auto;
      background: #ffffff;
    }

    table {
      min-width: 2520px;
      width: max-content;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.88rem;
    }

    col.date-col {
      width: 78px;
    }

    col.team-col {
      width: 200px;
    }

    col.score-col {
      width: 54px;
    }

    col.winner-col {
      width: 160px;
    }

    col.spacer-col {
      width: 20px;
    }

    col.player-col {
      width: 112px;
    }

    th,
    td {
      height: 42px;
      border: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: middle;
      overflow-wrap: anywhere;
      background: #ffffff;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 8;
      background: #f8fafc;
      color: #1f2937;
      font-weight: 900;
      text-align: center;
    }

    thead tr:first-child th {
      top: 0;
      height: 30px;
      background: #eef6fa;
      color: #52657b;
      font-size: 0.78rem;
    }

    thead tr:nth-child(2) th {
      top: 30px;
    }

    th:nth-child(1),
    td:nth-child(1) {
      position: sticky;
      left: 0;
      z-index: 6;
      width: 78px;
    }

    th:nth-child(2),
    td:nth-child(2) {
      position: sticky;
      left: 78px;
      z-index: 6;
      width: 200px;
    }

    th:nth-child(3),
    td:nth-child(3) {
      position: sticky;
      left: 278px;
      z-index: 6;
      width: 54px;
    }

    th:nth-child(4),
    td:nth-child(4) {
      position: sticky;
      left: 332px;
      z-index: 6;
      width: 200px;
    }

    th:nth-child(5),
    td:nth-child(5) {
      position: sticky;
      left: 532px;
      z-index: 6;
      width: 54px;
    }

    th:nth-child(6),
    td:nth-child(6) {
      position: sticky;
      left: 586px;
      z-index: 6;
      width: 160px;
    }

    thead th:nth-child(-n + 6) {
      z-index: 12;
    }

    tbody td:nth-child(-n + 6) {
      background: #ffffff;
    }

    .date-cell,
    .score-cell,
    .winner-cell,
    .player-cell,
    .points-cell {
      text-align: center;
      font-weight: 800;
    }

    .team-cell {
      font-weight: 900;
    }

    .team-line {
      display: flex;
      gap: 9px;
      align-items: center;
      min-width: 0;
    }

    .flag-wrap {
      width: 28px;
      height: 19px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .flag,
    .flag-emoji {
      grid-area: 1 / 1;
    }

    .flag {
      width: 28px;
      height: 19px;
      border: 1px solid #e2e8f0;
      border-radius: 2px;
      object-fit: cover;
      background: #ffffff;
    }

    .flag-emoji {
      font-size: 1.08rem;
      line-height: 1;
    }

    .group-row td {
      height: 34px;
      background: #f1d294;
      font-weight: 900;
      text-align: center;
    }

    .group-row td:nth-child(-n + 6) {
      background: var(--group-color, #f1d294);
    }

    .group-spacer td {
      height: 18px;
      padding: 0;
      color: transparent;
      background: #fbfdff;
    }

    .points-row td {
      background: #f8fafc;
      font-weight: 900;
    }

    .points-label {
      text-align: left;
      color: #475569;
    }

    .pick-hit {
      color: var(--hit-text);
      background: var(--hit);
    }

    .pick-miss {
      color: var(--miss-text);
      background: var(--miss);
    }

    .pick-pending {
      color: #475569;
      background: var(--pending);
    }

    .empty-player {
      color: transparent;
      background: #fcfdff;
    }

    .footer-row td {
      height: 46px;
      background: #eef6fa;
      font-weight: 900;
    }

    .total-row td {
      color: #ffffff;
      background: #0077b6;
    }

    .note {
      padding: 12px 20px 18px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.45;
    }

    .mobile-participants {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      padding: 0 20px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
    }

    .mobile-participants[hidden] {
      display: none;
    }

    .mobile-participant-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 12px;
      background: #ffffff;
    }

    .mobile-participant-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 900;
    }

    .mobile-participant-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1.35;
    }

    @media (max-width: 760px) {
      .hero-inner,
      .panel-head {
        align-items: stretch;
        flex-direction: column;
      }

      .hero-actions,
      .toolbar {
        justify-content: flex-start;
      }

      .desktop-only {
        display: none;
      }

      .table-wrap {
        max-height: 68vh;
      }

      table {
        min-width: 1860px;
      }

      col.date-col {
        width: 72px;
      }

      col.team-col {
        width: 150px;
      }

      col.score-col {
        width: 46px;
      }

      col.winner-col {
        width: 118px;
      }

      col.player-col {
        width: 96px;
      }

      th:nth-child(1),
      td:nth-child(1),
      th:nth-child(2),
      td:nth-child(2),
      th:nth-child(3),
      td:nth-child(3),
      th:nth-child(4),
      td:nth-child(4),
      th:nth-child(5),
      td:nth-child(5),
      th:nth-child(6),
      td:nth-child(6) {
        position: static;
        left: auto;
        z-index: auto;
        width: auto;
      }

      thead th:nth-child(-n + 6) {
        z-index: 8;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div>
        <p class="eyebrow">Quiniela Mundial 2026</p>
        <h1>Predicciones de participantes</h1>
      </div>
      <nav class="hero-actions" aria-label="Navegacion principal">
        <a class="btn primary" href="cuartos.html">Llenar cuartos</a>
        <a class="btn" href="index.html">Inicio</a>
      </nav>
    </div>
  </header>

  <main class="content">
    <section class="panel" id="groupPredictionsPanel" aria-label="Predicciones guardadas de fase de grupos" hidden aria-hidden="true">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">Fase de grupos</h2>
          <p class="panel-copy" id="statusText">Cargando predicciones guardadas...</p>
        </div>
        <div class="toolbar">
          <span class="status-pill" id="participantCount">0 participantes</span>
        </div>
      </div>

      <div class="mobile-participants" id="mobileParticipants" hidden></div>

      <div class="table-wrap" aria-label="Tabla de predicciones con desplazamiento horizontal">
        <table aria-describedby="statusText">
          <colgroup>
            <col class="date-col">
            <col class="team-col">
            <col class="score-col">
            <col class="team-col">
            <col class="score-col">
            <col class="winner-col">
            <col class="spacer-col">
            <col class="player-col" span="16">
          </colgroup>
          <thead id="predictionsHead"></thead>
          <tbody id="predictionsBody"></tbody>
        </table>
      </div>
      <div class="note" id="tableNote" hidden></div>
    </section>

    <section class="panel" id="roundPredictionsPanel" aria-label="Predicciones de cuartos">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">Cuartos de final</h2>
          <p class="panel-copy" id="roundStatusText">Cargando predicciones de la fase…</p>
        </div>
        <div class="toolbar">
          <span class="status-pill" id="roundParticipantCount">0 participantes</span>
          <button class="btn secondary desktop-only" type="button" id="fullscreenBtn" aria-pressed="false">Pantalla completa</button>
          <button class="btn secondary" type="button" id="refreshBtn">Actualizar</button>
        </div>
      </div>
      <div class="mobile-participants" id="roundMobileParticipants" hidden></div>
      <div class="table-wrap" aria-label="Tabla de predicciones de cuartos con desplazamiento horizontal">
        <table aria-describedby="roundStatusText">
          <colgroup>
            <col class="date-col"><col class="team-col"><col class="score-col"><col class="team-col"><col class="score-col"><col class="winner-col"><col class="spacer-col"><col class="player-col" span="16">
          </colgroup>
          <thead id="roundPredictionsHead"></thead>
          <tbody id="roundPredictionsBody"></tbody>
        </table>
      </div>
      <div class="note" id="roundTableNote" hidden></div>
    </section>
  </main>

    function normalizePredictionsPayload(data) {
      return {
        results: Array.isArray(data && data.results)
          ? data.results.filter((result) => result && (result.matchId || result.apiId || result.home || result.away || result.status || result.winner))
          : [],
        participants: Array.isArray(data && data.participants) ? data.participants : [],
        totalParticipants: Number(data && data.totalParticipants ? data.totalParticipants : 0),
        generatedAt: data && data.generatedAt ? data.generatedAt : "",
        hiddenParticipants: Number(data && data.hiddenParticipants ? data.hiddenParticipants : 0),
        roundOf32: data && data.quarterfinals ? {
          matches: sortMatchesChronologically(Array.isArray(data.quarterfinals.matches) ? data.quarterfinals.matches : []),
          results: Array.isArray(data.quarterfinals.results) ? data.quarterfinals.results : [],
          participants: Array.isArray(data.quarterfinals.participants) ? data.quarterfinals.participants : [],
          totalParticipants: Number(data.quarterfinals.totalParticipants || 0),
          hiddenParticipants: Number(data.quarterfinals.hiddenParticipants || 0),
          ranking: Array.isArray(data.quarterfinals.ranking) ? data.quarterfinals.ranking : [],
          cumulativeRanking: Array.isArray(data.quarterfinals.cumulativeRanking) ? data.quarterfinals.cumulativeRanking : [],
        } : { matches: [], results: [], participants: [], totalParticipants: 0, hiddenParticipants: 0, ranking: [], cumulativeRanking: [] },
      };
    }

    function normalizeClientCrDate(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
      const parsed = new Date(text);
      if (Number.isNaN(parsed.getTime())) return text;
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: CR_TIME_ZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(parsed);
      const values = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${values.year}-${values.month}-${values.day}`;
    }

    function clientTimeMinutes(match) {
      const stored = Number(match && match.crTimeMinutes);
      if (Number.isFinite(stored) && stored >= 0) return stored;
      const text = String(match && match.crTime || "").toLowerCase();
      const parts = text.match(/(\d{1,2}):(\d{2})\s*([ap])\.?\s*m\.?/);
      if (!parts) return 0;
      let hour = Number(parts[1]) % 12;
      if (parts[3] === "p") hour += 12;
      return hour * 60 + Number(parts[2]);
    }

    function sortMatchesChronologically(matches) {
      return (matches || []).map((match) => ({
        ...match,
        crDate: normalizeClientCrDate(match && (match.crDate || match.date)),
      })).sort((a, b) =>
        String(a.crDate || "").localeCompare(String(b.crDate || "")) ||
        clientTimeMinutes(a) - clientTimeMinutes(b) ||
        Number(a.number || 0) - Number(b.number || 0)
      );
    }

      });
    }

    function applyPredictionsPayload(data, options = {}) {
      const nextData = normalizePredictionsPayload(data);
      const nextSignature = stablePredictionsSignature(nextData);
      const changed = nextSignature !== predictionsDataSignature;

      state.results = nextData.results;
      state.participants = nextData.participants;
      state.totalParticipants = nextData.totalParticipants || state.participants.length;
      state.generatedAt = nextData.generatedAt;
      state.hiddenParticipants = nextData.hiddenParticipants;
      state.roundOf32 = nextData.roundOf32;
      predictionsDataSignature = nextSignature;

      if (!options.fromStorage) {
        savePredictionsToStorage(nextData);
      }

      if (changed || options.forceRender) {
        renderPredictions();
      } else {
        renderStatus();
      }
    }

    function loadPredictionsFromStorage() {
      try {
        const cached = JSON.parse(localStorage.getItem(PREDICTIONS_STORAGE_KEY) || "null");
        if (!cached || !cached.savedAt || !cached.data) return false;
        if (Date.now() - cached.savedAt > PREDICTIONS_STORAGE_MAX_AGE_MS) return false;
        applyPredictionsPayload(cached.data, { fromStorage: true, forceRender: true });
        return true;
      } catch (ignore) {
        return false;
      }
    }

    function savePredictionsToStorage(data) {
      try {
        localStorage.setItem(PREDICTIONS_STORAGE_KEY, JSON.stringify({
          savedAt: Date.now(),
          data,
        }));
      } catch (ignore) {}
    }

    function renderPredictions() {
      const columns = displayColumns();
      const resultsById = mapByMatchId(state.results);
      predictionsHead.innerHTML = renderHead(columns);
      predictionsBody.innerHTML = renderBody(columns, resultsById);
      renderMobileParticipants();
      renderStatus();
      renderRoundPredictions();
      updateFullscreenButton();
    }

    function renderRoundPredictions() {
      if (!roundPredictionsHead || !roundPredictionsBody) return;
      const round = state.roundOf32 || { matches: [], results: [], participants: [] };
      const columns = roundDisplayColumns();
      const resultsById = mapByMatchId(round.results, round.matches);
      roundPredictionsHead.innerHTML = renderHead(columns);
      roundPredictionsBody.innerHTML = renderRoundBody(round, columns, resultsById);
      renderRoundMobileParticipants(round, columns, resultsById);
      renderRoundStatus();
    }

    function renderRoundBody(round, columns, resultsById) {
      const matches = round.matches || [];
      const rows = [];
      rows.push(`
        <tr class="group-row" style="--group-color:#cfe2f3;">
          <td></td><td>Cuartos</td><td></td><td>Cuartos</td><td></td><td></td><td></td>
          ${columns.map(() => "<td></td>").join("")}
        </tr>
      `);
      (matches || []).forEach((match) => rows.push(renderMatchRow(match, columns, resultsById.get(match.id))));
      rows.push(renderSpacerRow(columns));
      rows.push(renderFooterNames(columns));
      rows.push(renderRoundSummaryRow("Puntos anteriores", columns, (participant) => previousPhasePoints(participant, round, matches, resultsById)));
      rows.push(renderRoundSummaryRow("Puntos cuartos", columns, (participant) => roundPhasePoints(participant, round, matches, resultsById)));
      rows.push(renderRoundSummaryRow("Total puntos", columns, (participant) => cumulativePoints(participant, round, matches, resultsById), "total-row"));
      rows.push(renderRoundChampionRow(columns));
      return rows.join("");
    }

    function renderRoundSummaryRow(label, columns, valueForParticipant, extraClass = "") {
      const cells = columns.map((participant) => {
        if (!participant) return '<td class="points-cell empty-player">.</td>';
        return `<td class="points-cell">${escapeHtml(valueForParticipant(participant))}</td>`;
      }).join("");
      return `<tr class="footer-row ${extraClass}"><td></td><td>${escapeHtml(label)}</td><td></td><td></td><td></td><td></td><td></td>${cells}</tr>`;
    }

    function renderRoundChampionRow(columns) {
      return `<tr class="footer-row"><td></td><td>Campeón elegido</td><td></td><td></td><td></td><td></td><td></td>${columns.map((participant) =>
        `<td class="player-cell ${participant ? "" : "empty-player"}">${participant ? escapeHtml(participant.champion || "Sin selección") : "."}</td>`
      ).join("")}</tr>`;
    }

    function participantKey(value) {
      return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toLowerCase();
    }

    function rankingPoints(rows, participant, fallback) {
      const key = participantKey(participant && participant.name);
      const row = (Array.isArray(rows) ? rows : []).find((item) => participantKey(item && item.name) === key);
      return row ? Number(row.points || 0) : Number(fallback || 0);
    }

    function roundPhasePoints(participant, round, matches, resultsById) {
      const computed = scoreForMatches(participant, matches, resultsById);
      return rankingPoints(round.ranking, participant, computed);
    }

    function cumulativePoints(participant, round, matches, resultsById) {
      const phase = roundPhasePoints(participant, round, matches, resultsById);
      return rankingPoints(round.cumulativeRanking, participant, phase);
    }

    function previousPhasePoints(participant, round, matches, resultsById) {
      return Math.max(0, cumulativePoints(participant, round, matches, resultsById) - roundPhasePoints(participant, round, matches, resultsById));
    }

    function roundDisplayColumns() {
      const columns = (state.roundOf32 && Array.isArray(state.roundOf32.participants) ? state.roundOf32.participants : []).slice(0, MAX_VISIBLE_PARTICIPANTS);
      while (columns.length < MAX_VISIBLE_PARTICIPANTS) columns.push(null);
      return columns;
    }

    function renderRoundMobileParticipants(round, columns, resultsById) {
      const matches = round.matches || [];
      const participants = columns.filter(Boolean).map((participant) => ({
        ...participant,
        phasePoints: roundPhasePoints(participant, round, matches, resultsById),
        totalPoints: cumulativePoints(participant, round, matches, resultsById),
      })).sort((a, b) => b.totalPoints - a.totalPoints || String(a.name || "").localeCompare(String(b.name || ""), "es"));
      if (!participants.length) {
        roundMobileParticipants.hidden = true;
        roundMobileParticipants.replaceChildren();
        return;
      }
      roundMobileParticipants.hidden = false;
      roundMobileParticipants.innerHTML = participants.map((participant, index) => `
        <article class="mobile-participant-card">
          <div class="mobile-participant-top"><span>${index + 1}. ${escapeHtml(participant.name)}</span><span>${escapeHtml(participant.totalPoints)} pts total</span></div>
          <div class="mobile-participant-meta">Campeón elegido: ${escapeHtml(participant.champion || "Sin selección")}</div>
          <div class="mobile-participant-meta">Cuartos: ${escapeHtml(participant.phasePoints)} pts</div>
        </article>
      `).join("");
    }

    function renderRoundStatus() {
      const round = state.roundOf32 || {};
      const total = Number(round.totalParticipants || (round.participants || []).length || 0);
      roundParticipantCount.textContent = `${total} participante${total === 1 ? "" : "s"}`;
      roundStatusText.textContent = total
        ? `Predicciones de cuartos. Actualizado: ${state.generatedAt ? formatDateTime(state.generatedAt) : "pendiente"}.`
        : "Aún no hay predicciones enviadas para cuartos.";
      const hidden = Number(round.hiddenParticipants || 0);
      roundTableNote.hidden = hidden === 0;
      roundTableNote.textContent = hidden ? `Hay ${hidden} participante${hidden === 1 ? "" : "s"} adicional${hidden === 1 ? "" : "es"}.` : "";
    }

    function isTableFullscreen() {
      return document.fullscreenElement === predictionsPanel || predictionsPanel.classList.contains("is-fullscreen");
    }

    function toggleTableFullscreen() {
      if (!desktopMedia.matches) return;
      if (isTableFullscreen()) {
        if (document.fullscreenElement === predictionsPanel && document.exitFullscreen) {
          document.exitFullscreen();
        }
        predictionsPanel.classList.remove("is-fullscreen");
        updateFullscreenButton();
        return;
      }

      if (predictionsPanel.requestFullscreen) {
        predictionsPanel.requestFullscreen().catch(() => {
          predictionsPanel.classList.add("is-fullscreen");
          updateFullscreenButton();
        });
      } else {
        predictionsPanel.classList.add("is-fullscreen");
        updateFullscreenButton();
      }
    }

    function updateFullscreenButton() {
      const available = desktopMedia.matches;
      fullscreenBtn.hidden = !available;
      if (!available && predictionsPanel.classList.contains("is-fullscreen")) {
        predictionsPanel.classList.remove("is-fullscreen");
      }
      const active = isTableFullscreen();
      fullscreenBtn.textContent = active ? "Salir de pantalla completa" : "Pantalla completa";
      fullscreenBtn.setAttribute("aria-pressed", active ? "true" : "false");
    }

    function renderHead(columns) {
      const numberCells = columns.map((participant, index) =>
        `<th class="${participant ? "" : "empty-player"}">${escapeHtml(index + 1)}</th>`
      ).join("");
      const nameCells = columns.map((participant) =>
        `<th class="${participant ? "" : "empty-player"}">${participant ? escapeHtml(participant.name) : "."}</th>`
      ).join("");

      return `
        <tr>
          <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
          ${numberCells}
        </tr>
        <tr>
          <th>Fecha</th>
          <th>Local</th>
          <th>GL</th>
          <th>Visita</th>
          <th>GV</th>
          <th>Ganador</th>
          <th></th>
          ${nameCells}
        </tr>
      `;
    }

    function renderBody(columns, resultsById) {
      const groups = groupedMatches();
      const rows = [];

      groups.forEach(([group, matches]) => {
        rows.push(renderGroupHeader(group, columns));
        matches.forEach((match) => rows.push(renderMatchRow(match, columns, resultsById.get(match.id))));
        rows.push(renderPointsRow(group, matches, columns, resultsById));
        rows.push(renderSpacerRow(columns));
      });

      rows.push(renderFooterNames(columns));
      rows.push(renderTotalRow(columns, resultsById));
      rows.push(renderChampionRow(columns));
      return rows.join("");
    }

    function renderGroupHeader(group, columns) {
      const color = GROUP_COLORS[group] || "#f1d294";
      return `
        <tr class="group-row" style="--group-color: ${color};">
          <td></td>
          <td>Grupo ${escapeHtml(group)}</td>
          <td></td>
          <td>Grupo ${escapeHtml(group)}</td>
          <td></td>
          <td></td>
          <td></td>
          ${columns.map(() => "<td></td>").join("")}
        </tr>
      `;
    }

    function renderMatchRow(match, columns, result) {
      const computed = isComputed(result);
      const winnerLabel = computed ? result.winnerLabel || getPickLabel(match, result.winner) : "";
      const homeGoals = computed ? regularTimeGoal(result, "home") : "";
      const awayGoals = computed ? regularTimeGoal(result, "away") : "";
      const predictionCells = columns.map((participant) => renderPredictionCell(participant, match, result)).join("");

      return `
        <tr>
          <td class="date-cell">${escapeHtml(shortDate(match.crDate))}</td>
          <td class="team-cell">${teamLine(match.home)}</td>
          <td class="score-cell">${escapeHtml(homeGoals)}</td>
          <td class="team-cell">${teamLine(match.away)}</td>
          <td class="score-cell">${escapeHtml(awayGoals)}</td>
          <td class="winner-cell">${escapeHtml(winnerLabel)}</td>
          <td></td>
          ${predictionCells}
        </tr>
      `;
    }

    function renderPredictionCell(participant, match, result) {
      if (!participant) return '<td class="player-cell empty-player">.</td>';
      const pick = participant.picksByMatchId ? participant.picksByMatchId[match.id] : null;
      const label = pick ? pick.pickLabel || getPickLabel(match, pick.pick) : "";
      const computed = isComputed(result);
      const stateClass = computed && pick
        ? (pick.pick === result.winner ? "pick-hit" : "pick-miss")
        : "pick-pending";
      return `<td class="player-cell ${stateClass}">${escapeHtml(label)}</td>`;
    }

    function renderPointsRow(group, matches, columns, resultsById) {
      const hasComputed = matches.some((match) => isComputed(resultsById.get(match.id)));
      const cells = columns.map((participant) => {
        if (!participant) return '<td class="points-cell empty-player">.</td>';
        return `<td class="points-cell">${hasComputed ? escapeHtml(scoreForMatches(participant, matches, resultsById)) : ""}</td>`;
      }).join("");

      return `
        <tr class="points-row">
          <td></td>
          <td class="points-label">Puntos grupo ${escapeHtml(group)}</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${cells}
        </tr>
      `;
    }

    function renderSpacerRow(columns) {
      return `
        <tr class="group-spacer">
          <td>.</td><td>.</td><td>.</td><td>.</td><td>.</td><td>.</td><td>.</td>
          ${columns.map(() => "<td>.</td>").join("")}
        </tr>
      `;
    }

    function renderFooterNames(columns) {
      return `
        <tr class="footer-row">
          <td></td>
          <td>Participantes</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${columns.map((participant) => `<td class="player-cell ${participant ? "" : "empty-player"}">${participant ? escapeHtml(participant.name) : "."}</td>`).join("")}
        </tr>
      `;
    }

    function renderTotalRow(columns, resultsById) {
      const cells = columns.map((participant) => {
        if (!participant) return '<td class="points-cell empty-player">.</td>';
        return `<td class="points-cell">${escapeHtml(scoreForMatches(participant, state.matches, resultsById))}</td>`;
      }).join("");

      return `
        <tr class="footer-row total-row">
          <td></td>
          <td>Total puntos</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${cells}
        </tr>
      `;
    }

    function renderChampionRow(columns) {
      return `
        <tr class="footer-row">
          <td></td>
          <td>Campeón elegido</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${columns.map((participant) => `<td class="player-cell ${participant ? "" : "empty-player"}">${participant ? escapeHtml(participant.champion || "") : "."}</td>`).join("")}
        </tr>
      `;
    }

    function renderMobileParticipants() {
      const resultsById = mapByMatchId(state.results);
      const participants = state.participants
        .slice(0, MAX_VISIBLE_PARTICIPANTS)
        .map((participant) => ({
          ...participant,
          score: scoreForMatches(participant, state.matches, resultsById),
        }))
        .sort((a, b) => b.score - a.score || String(a.name || "").localeCompare(String(b.name || ""), "es"));
      if (participants.length === 0) {
        mobileParticipants.hidden = true;
        mobileParticipants.replaceChildren();
        return;
      }

      mobileParticipants.hidden = false;
      mobileParticipants.innerHTML = participants.map((participant, index) => `
        <article class="mobile-participant-card">
          <div class="mobile-participant-top">
            <span>${escapeHtml(index + 1)}. ${escapeHtml(participant.name)}</span>
            <span>${escapeHtml(participant.score)} pts</span>
          </div>
          <div class="mobile-participant-meta">
            Campeón elegido: ${escapeHtml(participant.champion || "Sin escoger")}
          </div>
        </article>
      `).join("");
    }

    function groupedMatches() {
      const order = [];
      const groups = new Map();
      state.matches
        .slice()
        .sort((a, b) => String(a.group).localeCompare(String(b.group)) || a.number - b.number)
        .forEach((match) => {
          if (!groups.has(match.group)) {
            groups.set(match.group, []);
            order.push(match.group);
          }
          groups.get(match.group).push(match);
        });
      return order.map((group) => [group, groups.get(group)]);
    }

    function displayColumns() {
      const columns = state.participants.slice(0, MAX_VISIBLE_PARTICIPANTS);
      while (columns.length < MAX_VISIBLE_PARTICIPANTS) columns.push(null);
      return columns;
    }

    function mapByMatchId(results, matches = []) {
      const map = new Map();
      const resultsByNumber = new Map();
      (Array.isArray(results) ? results : []).forEach((result) => {
        if (result && result.matchId) map.set(String(result.matchId), result);
        if (result && result.number !== "" && result.number !== null && result.number !== undefined) {
          resultsByNumber.set(Number(result.number), result);
        }
      });
      (Array.isArray(matches) ? matches : []).forEach((match) => {
        const id = String(match && match.id || "");
        if (!id || map.has(id)) return;
        const fallback = resultsByNumber.get(Number(match.number));
        if (fallback) map.set(id, fallback);
      });
      return map;
    }

    function isComputed(result) {
      if (!result || !result.winner) return false;
      const hasExplicitFlag = result.regularTimeComplete !== "" &&
        result.regularTimeComplete !== null &&
        result.regularTimeComplete !== undefined;
      if (hasExplicitFlag) {
        return result.regularTimeComplete === true || String(result.regularTimeComplete).toLowerCase() === "true";
      }
      return FINISHED_STATUSES.has(result.status);
    }

    function regularTimeGoal(result, side) {
      if (!result) return "";
      const regularValue = side === "home" ? result.regularHomeGoals : result.regularAwayGoals;
      if (regularValue !== "" && regularValue !== null && regularValue !== undefined) return regularValue;
      const legacyValue = side === "home" ? result.homeGoals : result.awayGoals;
      return legacyValue !== null && legacyValue !== undefined ? legacyValue : "";
    }

    function scoreForMatches(participant, matches, resultsById) {
      return matches.reduce((total, match) => {
        const result = resultsById.get(match.id);
        const pick = participant.picksByMatchId ? participant.picksByMatchId[match.id] : null;
        return total + (isComputed(result) && pick && pick.pick === result.winner ? 1 : 0);
      }, 0);
    }

    function teamLine(team) {
      return `<span class="team-line">${flagImg(team)}<span>${escapeHtml(team.name)}</span></span>`;
    }

    function flagImg(team) {
      if (!team) return "";
      if (!team.flagCode) return '<span class="flag-wrap"></span>';
      const code = String(team.flagCode).toLowerCase();
      return `<span class="flag-wrap"><img class="flag" src="https://flagcdn.com/w40/${escapeHtml(code)}.png" srcset="https://flagcdn.com/w80/${escapeHtml(code)}.png 2x" onerror="this.hidden=true" alt=""></span>`;
    }

    function getPickLabel(match, pick) {
      if (pick === "home") return match.home.name;
      if (pick === "away") return match.away.name;
      if (pick === "draw") return "Empate";
      return "";
    }

    function shortDate(value) {
      const normalized = normalizeClientCrDate(value);
      const parts = normalized.split("-");
      if (parts.length !== 3) return normalized;
      const month = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"][Number(parts[1]) - 1];
      if (!month) return normalized;
      return `${String(Number(parts[2])).padStart(2, "0")}-${month}`;
    }

    function renderStatus() {
      const total = state.totalParticipants || state.participants.length;
      const visible = Math.min(state.participants.length, MAX_VISIBLE_PARTICIPANTS);
      participantCount.textContent = `${total} participante${total === 1 ? "" : "s"}`;

      if (total === 0) {
        statusText.textContent = "Aun no hay predicciones publicadas. Cuando lleguen respuestas, aparecerán en esta tabla.";
      } else {
        const when = state.generatedAt ? ` Actualizado: ${formatDateTime(state.generatedAt)}.` : "";
        statusText.textContent = `Mostrando ${visible} de ${total} participante${total === 1 ? "" : "s"}.${when}`;
      }

      if (state.hiddenParticipants > 0) {
        tableNote.textContent = `Se muestran los primeros ${MAX_VISIBLE_PARTICIPANTS} participantes. Hay ${state.hiddenParticipants} participante${state.hiddenParticipants === 1 ? "" : "s"} adicional${state.hiddenParticipants === 1 ? "" : "es"}.`;
        tableNote.hidden = false;
      } else {
        tableNote.textContent = "";
        tableNote.hidden = true;
      }
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("es-CR", {
        timeZone: "America/Costa_Rica",
        dateStyle: "medium",
        timeStyle: "short",
      }).format(date);
    }

    function nowInCostaRica() {
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone: CR_TIME_ZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      });
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: CR_TIME_ZONE,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).formatToParts(new Date());
      const hour = Number(parts.find((part) => part.type === "hour").value);
      const minute = Number(parts.find((part) => part.type === "minute").value);
      return {
        date: formatter.format(new Date()),
        minutes: hour * 60 + minute,
      };
    }

    function hasLiveWindow(now = nowInCostaRica()) {
      return state.results.some((result) => LIVE_STATUSES.has(result.status)) ||
        (state.roundOf32 && state.roundOf32.results || []).some((result) => LIVE_STATUSES.has(result.status)) ||
        state.matches.concat(state.roundOf32 && state.roundOf32.matches || []).some((match) =>
          match.crDate === now.date &&
          now.minutes >= match.crTimeMinutes &&
          now.minutes <= match.crTimeMinutes + 130
        );
    }

    function currentPredictionsRefreshMs() {
      return hasLiveWindow() ? LIVE_PREDICTIONS_REFRESH_MS : STANDARD_PREDICTIONS_REFRESH_MS;
    }

    function schedulePredictionsRefresh() {
      window.clearTimeout(predictionsRefreshTimer);
      predictionsRefreshTimer = window.setTimeout(() => {
        loadPredictionsData().finally(schedulePredictionsRefresh);
      }, currentPredictionsRefreshMs());
    }

    function refreshPredictionsNow() {
      window.clearTimeout(predictionsRefreshTimer);
      loadPredictionsData(true).finally(schedulePredictionsRefresh);
    }

    function loadPredictionsData(force = false) {
      if (predictionsRequestInFlight) return predictionsRequestInFlight;

      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PEGA_AQUI")) {
        return Promise.resolve();
      }

      refreshBtn.disabled = true;
      const separator = APPS_SCRIPT_URL.includes("?") ? "&" : "?";
      predictionsRequestInFlight = jsonp(`${APPS_SCRIPT_URL}${separator}action=predictionsData&_=${Date.now()}`)
        .then((data) => {
          if (data && data.ok) {
            applyPredictionsPayload(data);
          }
        })
        .catch(() => {})
        .finally(() => {
          predictionsRequestInFlight = null;
          refreshBtn.disabled = false;
        });
      return predictionsRequestInFlight;
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `quinielaPredicciones_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const separator = url.includes("?") ? "&" : "?";
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Tiempo de espera agotado."));
        }, 12000);

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("No se pudo cargar la informacion."));
        };

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.charset = "UTF-8";
        script.src = `${url}${separator}callback=${encodeURIComponent(callbackName)}`;
        document.body.appendChild(script);
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    if (!loadPredictionsFromStorage()) {
      renderPredictions();
    }
    loadPredictionsData().finally(schedulePredictionsRefresh);
  </script>
</body>
</html>
