<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Predicciones de participantes</title>
  <style>
    :root {
      --blue: #0077b6;
      --sky: #caf0f8;
      --ink: #132033;
      --muted: #607087;
      --line: #cfd8dc;
      --hit: #d9f2df;
      --hit-text: #14532d;
      --miss: #fde2e2;
      --miss-text: #8a1c1c;
      --pending: #f8fafc;
      --shadow: 0 22px 56px rgba(7, 24, 39, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--sky);
    }

    button,
    a {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .hero {
      background: var(--blue);
      color: #ffffff;
    }

    .hero-inner,
    .content {
      width: min(1440px, calc(100% - 28px));
      margin: 0 auto;
    }

    .hero-inner {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      padding: 32px 0 26px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: rgba(255, 255, 255, 0.78);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.02;
    }

    .hero-actions,
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.44);
      border-radius: var(--radius);
      padding: 0 14px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
      text-decoration: none;
      font-weight: 900;
    }

    .btn.primary {
      color: var(--blue);
      background: #ffffff;
    }

    .btn.secondary {
      border-color: #bfd7e2;
      color: var(--blue);
      background: #ffffff;
    }

    .content {
      padding: 22px 0 38px;
    }

    .panel {
      border: 1px solid rgba(191, 215, 226, 0.92);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      line-height: 1.15;
    }

    .panel-copy {
      margin: 7px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.42;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 0 13px;
      color: #475569;
      background: #ffffff;
      font-weight: 900;
      white-space: nowrap;
    }

    .table-wrap {
      width: 100%;
      max-height: 72vh;
      overflow: auto;
      background: #ffffff;
    }

    table {
      min-width: 2520px;
      width: max-content;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.88rem;
    }

    col.date-col {
      width: 78px;
    }

    col.team-col {
      width: 200px;
    }

    col.score-col {
      width: 54px;
    }

    col.winner-col {
      width: 160px;
    }

    col.spacer-col {
      width: 20px;
    }

    col.player-col {
      width: 112px;
    }

    th,
    td {
      height: 42px;
      border: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: middle;
      overflow-wrap: anywhere;
      background: #ffffff;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 8;
      background: #f8fafc;
      color: #1f2937;
      font-weight: 900;
      text-align: center;
    }

    thead tr:first-child th {
      top: 0;
      height: 30px;
      background: #eef6fa;
      color: #52657b;
      font-size: 0.78rem;
    }

    thead tr:nth-child(2) th {
      top: 30px;
    }

    th:nth-child(1),
    td:nth-child(1) {
      position: sticky;
      left: 0;
      z-index: 6;
      width: 78px;
    }

    th:nth-child(2),
    td:nth-child(2) {
      position: sticky;
      left: 78px;
      z-index: 6;
      width: 200px;
    }

    th:nth-child(3),
    td:nth-child(3) {
      position: sticky;
      left: 278px;
      z-index: 6;
      width: 54px;
    }

    th:nth-child(4),
    td:nth-child(4) {
      position: sticky;
      left: 332px;
      z-index: 6;
      width: 200px;
    }

    th:nth-child(5),
    td:nth-child(5) {
      position: sticky;
      left: 532px;
      z-index: 6;
      width: 54px;
    }

    th:nth-child(6),
    td:nth-child(6) {
      position: sticky;
      left: 586px;
      z-index: 6;
      width: 160px;
    }

    thead th:nth-child(-n + 6) {
      z-index: 12;
    }

    tbody td:nth-child(-n + 6) {
      background: #ffffff;
    }

    .date-cell,
    .score-cell,
    .winner-cell,
    .player-cell,
    .points-cell {
      text-align: center;
      font-weight: 800;
    }

    .team-cell {
      font-weight: 900;
    }

    .team-line {
      display: flex;
      gap: 9px;
      align-items: center;
      min-width: 0;
    }

    .flag-wrap {
      width: 28px;
      height: 19px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .flag,
    .flag-emoji {
      grid-area: 1 / 1;
    }

    .flag {
      width: 28px;
      height: 19px;
      border: 1px solid #e2e8f0;
      border-radius: 2px;
      object-fit: cover;
      background: #ffffff;
    }

    .flag-emoji {
      font-size: 1.08rem;
      line-height: 1;
    }

    .group-row td {
      height: 34px;
      background: #f1d294;
      font-weight: 900;
      text-align: center;
    }

    .group-row td:nth-child(-n + 6) {
      background: var(--group-color, #f1d294);
    }

    .group-spacer td {
      height: 18px;
      padding: 0;
      color: transparent;
      background: #fbfdff;
    }

    .points-row td {
      background: #f8fafc;
      font-weight: 900;
    }

    .points-label {
      text-align: left;
      color: #475569;
    }

    .pick-hit {
      color: var(--hit-text);
      background: var(--hit);
    }

    .pick-miss {
      color: var(--miss-text);
      background: var(--miss);
    }

    .pick-pending {
      color: #475569;
      background: var(--pending);
    }

    .empty-player {
      color: transparent;
      background: #fcfdff;
    }

    .footer-row td {
      height: 46px;
      background: #eef6fa;
      font-weight: 900;
    }

    .total-row td {
      color: #ffffff;
      background: #0077b6;
    }

    .note {
      padding: 12px 20px 18px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.45;
    }

    .mobile-participants {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      padding: 0 20px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
    }

    .mobile-participants[hidden] {
      display: none;
    }

    .mobile-participant-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 12px;
      background: #ffffff;
    }

    .mobile-participant-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 900;
    }

    .mobile-participant-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1.35;
    }

    @media (max-width: 760px) {
      .hero-inner,
      .panel-head {
        align-items: stretch;
        flex-direction: column;
      }

      .hero-actions,
      .toolbar {
        justify-content: flex-start;
      }

      .table-wrap {
        max-height: 68vh;
      }

      table {
        min-width: 1860px;
      }

      col.date-col {
        width: 72px;
      }

      col.team-col {
        width: 150px;
      }

      col.score-col {
        width: 46px;
      }

      col.winner-col {
        width: 118px;
      }

      col.player-col {
        width: 96px;
      }

      th:nth-child(1),
      td:nth-child(1),
      th:nth-child(2),
      td:nth-child(2),
      th:nth-child(3),
      td:nth-child(3),
      th:nth-child(4),
      td:nth-child(4),
      th:nth-child(5),
      td:nth-child(5),
      th:nth-child(6),
      td:nth-child(6) {
        position: static;
        left: auto;
        z-index: auto;
        width: auto;
      }

      thead th:nth-child(-n + 6) {
        z-index: 8;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div>
        <p class="eyebrow">Quiniela Mundial 2026</p>
        <h1>Predicciones de participantes</h1>
      </div>
      <nav class="hero-actions" aria-label="Navegacion principal">
        <a class="btn primary" href="quiniela.html">Llenar quiniela</a>
        <a class="btn" href="index.html">Inicio</a>
      </nav>
    </div>
  </header>

  <main class="content">
    <section class="panel" aria-label="Predicciones guardadas">
      <div class="panel-head">
        <div>
          <p class="panel-copy" id="statusText">Cargando predicciones guardadas...</p>
        </div>
        <div class="toolbar">
          <span class="status-pill" id="participantCount">0 participantes</span>
          <button class="btn secondary" type="button" id="refreshBtn">Actualizar</button>
        </div>
      </div>

      <div class="mobile-participants" id="mobileParticipants" hidden></div>

      <div class="table-wrap" aria-label="Tabla de predicciones con desplazamiento horizontal">
        <table aria-describedby="statusText">
          <colgroup>
            <col class="date-col">
            <col class="team-col">
            <col class="score-col">
            <col class="team-col">
            <col class="score-col">
            <col class="winner-col">
            <col class="spacer-col">
            <col class="player-col" span="16">
          </colgroup>
          <thead id="predictionsHead"></thead>
          <tbody id="predictionsBody"></tbody>
        </table>
      </div>
      <div class="note" id="tableNote" hidden></div>
    </section>
  </main>

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-vt500y5fZEJ5QAT7z9y0Zn7WEJJTg6iAeTf2qvYp97cqa8EWhVVPcW_9psToHu-k/exec";
    const MAX_VISIBLE_PARTICIPANTS = 16;
    const GROUP_COLORS = {
      A: "#f1d294",
      B: "#e1deb9",
      C: "#e3ddeb",
      D: "#d9ead3",
      E: "#cfe2f3",
      F: "#f4cccc",
      G: "#d9d2e9",
      H: "#fff2cc",
      I: "#d0e0e3",
      J: "#ead1dc",
      K: "#d9ead3",
      L: "#c9daf8",
    };
    const FINISHED_STATUSES = new Set(["FINISHED", "AWARDED"]);
    const state = {
      matches: MATCHES,
      results: [],
      participants: [],
      totalParticipants: 0,
      generatedAt: "",
      hiddenParticipants: 0,
    };

    const predictionsHead = document.getElementById("predictionsHead");
    const predictionsBody = document.getElementById("predictionsBody");
    const statusText = document.getElementById("statusText");
    const participantCount = document.getElementById("participantCount");
    const tableNote = document.getElementById("tableNote");
    const mobileParticipants = document.getElementById("mobileParticipants");
    const refreshBtn = document.getElementById("refreshBtn");

    refreshBtn.addEventListener("click", loadPredictionsData);

    function renderPredictions() {
      const columns = displayColumns();
      const resultsById = mapByMatchId(state.results);
      predictionsHead.innerHTML = renderHead(columns);
      predictionsBody.innerHTML = renderBody(columns, resultsById);
      renderMobileParticipants();
      renderStatus();
    }

    function renderHead(columns) {
      const numberCells = columns.map((participant, index) =>
        `<th class="${participant ? "" : "empty-player"}">${escapeHtml(index + 1)}</th>`
      ).join("");
      const nameCells = columns.map((participant) =>
        `<th class="${participant ? "" : "empty-player"}">${participant ? escapeHtml(participant.name) : "."}</th>`
      ).join("");

      return `
        <tr>
          <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
          ${numberCells}
        </tr>
        <tr>
          <th>Fecha</th>
          <th>Local</th>
          <th>GL</th>
          <th>Visita</th>
          <th>GV</th>
          <th>Ganador</th>
          <th></th>
          ${nameCells}
        </tr>
      `;
    }

    function renderBody(columns, resultsById) {
      const groups = groupedMatches();
      const rows = [];

      groups.forEach(([group, matches]) => {
        rows.push(renderGroupHeader(group, columns));
        matches.forEach((match) => rows.push(renderMatchRow(match, columns, resultsById.get(match.id))));
        rows.push(renderPointsRow(group, matches, columns, resultsById));
        rows.push(renderSpacerRow(columns));
      });

      rows.push(renderFooterNames(columns));
      rows.push(renderTotalRow(columns, resultsById));
      rows.push(renderChampionRow(columns));
      return rows.join("");
    }

    function renderGroupHeader(group, columns) {
      const color = GROUP_COLORS[group] || "#f1d294";
      return `
        <tr class="group-row" style="--group-color: ${color};">
          <td></td>
          <td>Grupo ${escapeHtml(group)}</td>
          <td></td>
          <td>Grupo ${escapeHtml(group)}</td>
          <td></td>
          <td></td>
          <td></td>
          ${columns.map(() => "<td></td>").join("")}
        </tr>
      `;
    }

    function renderMatchRow(match, columns, result) {
      const computed = isComputed(result);
      const winnerLabel = computed ? result.winnerLabel || getPickLabel(match, result.winner) : "";
      const homeGoals = computed && result.homeGoals !== "" && result.homeGoals !== null ? result.homeGoals : "";
      const awayGoals = computed && result.awayGoals !== "" && result.awayGoals !== null ? result.awayGoals : "";
      const predictionCells = columns.map((participant) => renderPredictionCell(participant, match, result)).join("");

      return `
        <tr>
          <td class="date-cell">${escapeHtml(shortDate(match.crDate))}</td>
          <td class="team-cell">${teamLine(match.home)}</td>
          <td class="score-cell">${escapeHtml(homeGoals)}</td>
          <td class="team-cell">${teamLine(match.away)}</td>
          <td class="score-cell">${escapeHtml(awayGoals)}</td>
          <td class="winner-cell">${escapeHtml(winnerLabel)}</td>
          <td></td>
          ${predictionCells}
        </tr>
      `;
    }

    function renderPredictionCell(participant, match, result) {
      if (!participant) return '<td class="player-cell empty-player">.</td>';
      const pick = participant.picksByMatchId ? participant.picksByMatchId[match.id] : null;
      const label = pick ? pick.pickLabel || getPickLabel(match, pick.pick) : "";
      const computed = isComputed(result);
      const stateClass = computed && pick
        ? (pick.pick === result.winner ? "pick-hit" : "pick-miss")
        : "pick-pending";
      return `<td class="player-cell ${stateClass}">${escapeHtml(label)}</td>`;
    }

    function renderPointsRow(group, matches, columns, resultsById) {
      const hasComputed = matches.some((match) => isComputed(resultsById.get(match.id)));
      const cells = columns.map((participant) => {
        if (!participant) return '<td class="points-cell empty-player">.</td>';
        return `<td class="points-cell">${hasComputed ? escapeHtml(scoreForMatches(participant, matches, resultsById)) : ""}</td>`;
      }).join("");

      return `
        <tr class="points-row">
          <td></td>
          <td class="points-label">Puntos grupo ${escapeHtml(group)}</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${cells}
        </tr>
      `;
    }

    function renderSpacerRow(columns) {
      return `
        <tr class="group-spacer">
          <td>.</td><td>.</td><td>.</td><td>.</td><td>.</td><td>.</td><td>.</td>
          ${columns.map(() => "<td>.</td>").join("")}
        </tr>
      `;
    }

    function renderFooterNames(columns) {
      return `
        <tr class="footer-row">
          <td></td>
          <td>Participantes</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${columns.map((participant) => `<td class="player-cell ${participant ? "" : "empty-player"}">${participant ? escapeHtml(participant.name) : "."}</td>`).join("")}
        </tr>
      `;
    }

    function renderTotalRow(columns, resultsById) {
      const cells = columns.map((participant) => {
        if (!participant) return '<td class="points-cell empty-player">.</td>';
        return `<td class="points-cell">${escapeHtml(scoreForMatches(participant, state.matches, resultsById))}</td>`;
      }).join("");

      return `
        <tr class="footer-row total-row">
          <td></td>
          <td>Total puntos</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${cells}
        </tr>
      `;
    }

    function renderChampionRow(columns) {
      return `
        <tr class="footer-row">
          <td></td>
          <td>Campeón elegido</td>
          <td></td><td></td><td></td><td></td><td></td>
          ${columns.map((participant) => `<td class="player-cell ${participant ? "" : "empty-player"}">${participant ? escapeHtml(participant.champion || "") : "."}</td>`).join("")}
        </tr>
      `;
    }

    function renderMobileParticipants() {
      const resultsById = mapByMatchId(state.results);
      const participants = state.participants
        .slice(0, MAX_VISIBLE_PARTICIPANTS)
        .map((participant) => ({
          ...participant,
          score: scoreForMatches(participant, state.matches, resultsById),
        }))
        .sort((a, b) => b.score - a.score || String(a.name || "").localeCompare(String(b.name || ""), "es"));
      if (participants.length === 0) {
        mobileParticipants.hidden = true;
        mobileParticipants.replaceChildren();
        return;
      }

      mobileParticipants.hidden = false;
      mobileParticipants.innerHTML = participants.map((participant, index) => `
        <article class="mobile-participant-card">
          <div class="mobile-participant-top">
            <span>${escapeHtml(index + 1)}. ${escapeHtml(participant.name)}</span>
            <span>${escapeHtml(participant.score)} pts</span>
          </div>
          <div class="mobile-participant-meta">
            Campeón elegido: ${escapeHtml(participant.champion || "Sin escoger")}
          </div>
        </article>
      `).join("");
    }

    function groupedMatches() {
      const order = [];
      const groups = new Map();
      state.matches
        .slice()
        .sort((a, b) => String(a.group).localeCompare(String(b.group)) || a.number - b.number)
        .forEach((match) => {
          if (!groups.has(match.group)) {
            groups.set(match.group, []);
            order.push(match.group);
          }
          groups.get(match.group).push(match);
        });
      return order.map((group) => [group, groups.get(group)]);
    }

    function displayColumns() {
      const columns = state.participants.slice(0, MAX_VISIBLE_PARTICIPANTS);
      while (columns.length < MAX_VISIBLE_PARTICIPANTS) columns.push(null);
      return columns;
    }

    function mapByMatchId(results) {
      const map = new Map();
      (Array.isArray(results) ? results : []).forEach((result) => map.set(result.matchId, result));
      return map;
    }

    function isComputed(result) {
      return result && FINISHED_STATUSES.has(result.status) && result.winner;
    }

    function scoreForMatches(participant, matches, resultsById) {
      return matches.reduce((total, match) => {
        const result = resultsById.get(match.id);
        const pick = participant.picksByMatchId ? participant.picksByMatchId[match.id] : null;
        return total + (isComputed(result) && pick && pick.pick === result.winner ? 1 : 0);
      }, 0);
    }

    function teamLine(team) {
      return `<span class="team-line">${flagImg(team)}<span>${escapeHtml(team.name)}</span></span>`;
    }

    function flagImg(team) {
      if (!team) return "";
      if (!team.flagCode) return '<span class="flag-wrap"></span>';
      const code = String(team.flagCode).toLowerCase();
      return `<span class="flag-wrap"><img class="flag" src="https://flagcdn.com/w40/${escapeHtml(code)}.png" srcset="https://flagcdn.com/w80/${escapeHtml(code)}.png 2x" onerror="this.hidden=true" alt=""></span>`;
    }

    function getPickLabel(match, pick) {
      if (pick === "home") return match.home.name;
      if (pick === "away") return match.away.name;
      if (pick === "draw") return "Empate";
      return "";
    }

    function shortDate(value) {
      if (!value) return "";
      const date = new Date(`${value}T00:00:00-06:00`);
      if (Number.isNaN(date.getTime())) return value;
      const month = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"][date.getMonth()];
      return `${date.getDate()}-${month}`;
    }

    function renderStatus() {
      const total = state.totalParticipants || state.participants.length;
      const visible = Math.min(state.participants.length, MAX_VISIBLE_PARTICIPANTS);
      participantCount.textContent = `${total} participante${total === 1 ? "" : "s"}`;

      if (total === 0) {
        statusText.textContent = "Aun no hay predicciones publicadas. Cuando lleguen respuestas, aparecerán en esta tabla.";
      } else {
        const when = state.generatedAt ? ` Actualizado: ${formatDateTime(state.generatedAt)}.` : "";
        statusText.textContent = `Mostrando ${visible} de ${total} participante${total === 1 ? "" : "s"}.${when}`;
      }

      if (state.hiddenParticipants > 0) {
        tableNote.textContent = `Se muestran los primeros ${MAX_VISIBLE_PARTICIPANTS} participantes. Hay ${state.hiddenParticipants} participante${state.hiddenParticipants === 1 ? "" : "s"} adicional${state.hiddenParticipants === 1 ? "" : "es"}.`;
        tableNote.hidden = false;
      } else {
        tableNote.textContent = "";
        tableNote.hidden = true;
      }
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("es-CR", {
        timeZone: "America/Costa_Rica",
        dateStyle: "medium",
        timeStyle: "short",
      }).format(date);
    }

    function loadPredictionsData() {
      renderPredictions();

      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PEGA_AQUI")) {
        return Promise.resolve();
      }

      refreshBtn.disabled = true;
      return jsonp(`${APPS_SCRIPT_URL}?action=predictionsData`)
        .then((data) => {
          if (data && data.ok) {
            state.results = Array.isArray(data.results)
              ? data.results.filter((result) => result && (result.matchId || result.apiId || result.home || result.away || result.status || result.winner))
              : [];
            state.participants = Array.isArray(data.participants) ? data.participants : [];
            state.totalParticipants = Number(data.totalParticipants || state.participants.length);
            state.generatedAt = data.generatedAt || "";
            state.hiddenParticipants = Number(data.hiddenParticipants || 0);
          }
        })
        .catch(() => {})
        .finally(() => {
          refreshBtn.disabled = false;
          renderPredictions();
        });
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `quinielaPredicciones_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const separator = url.includes("?") ? "&" : "?";
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Tiempo de espera agotado."));
        }, 12000);

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("No se pudo cargar la informacion."));
        };

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.charset = "UTF-8";
        script.src = `${url}${separator}callback=${encodeURIComponent(callbackName)}`;
        document.body.appendChild(script);
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderPredictions();
    loadPredictionsData();
    window.setInterval(loadPredictionsData, 60000);
  </script>
</body>
</html>
