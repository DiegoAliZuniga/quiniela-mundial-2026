<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Predicciones de participantes</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #071827;
      background: #caf0f8;
    }

    main {
      width: min(760px, 100%);
      border-radius: 8px;
      padding: 30px;
      background: #ffffff;
      box-shadow: 0 22px 56px rgba(7, 24, 39, 0.16);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.05;
    }

    p {
      color: rgba(7, 24, 39, 0.7);
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      border-radius: 8px;
      padding: 0 16px;
      color: #ffffff;
      background: #0077b6;
      text-decoration: none;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <h1>Predicciones de participantes</h1>
    <p>Esta vista queda preparada para mostrar las quinielas enviadas por los participantes cuando definamos cómo quieres publicarlas.</p>
    <a href="index.html">Volver al inicio</a>
  </main>
</body>
</html>
